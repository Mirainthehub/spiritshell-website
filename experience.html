<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>灵壳 · SpiritShell</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html { height: 100%; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #fdfcff;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            opacity: 0;
            transition: opacity 1s ease;
        }

        body.visible { opacity: 1; }

        /* ─── Luma gradient orbs ─── */

        .orbs {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
        }

        .orb-1 {
            width: 720px;
            height: 720px;
            top: -30%;
            left: -20%;
            background: radial-gradient(circle, rgba(9, 158, 241, 0.22) 0%, transparent 60%);
            animation: drift-1 26s ease-in-out infinite;
        }

        .orb-2 {
            width: 600px;
            height: 600px;
            top: -20%;
            right: -18%;
            background: radial-gradient(circle, rgba(104, 99, 248, 0.20) 0%, transparent 60%);
            animation: drift-2 22s ease-in-out infinite;
        }

        .orb-3 {
            width: 640px;
            height: 640px;
            bottom: -25%;
            left: 50%;
            transform: translateX(-50%);
            background: radial-gradient(circle, rgba(240, 88, 197, 0.18) 0%, transparent 60%);
            animation: drift-3 30s ease-in-out infinite;
        }

        .orb-4 {
            width: 400px;
            height: 400px;
            bottom: -10%;
            right: -8%;
            background: radial-gradient(circle, rgba(255, 137, 31, 0.14) 0%, transparent 60%);
            animation: drift-4 18s ease-in-out infinite;
        }

        .orb-5 {
            width: 500px;
            height: 500px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, rgba(216, 79, 250, 0.07) 0%, transparent 60%);
            animation: breathe-orb 11s ease-in-out infinite;
        }

        @keyframes drift-1 {
            0%, 100% { transform: translate(0, 0); }
            40%       { transform: translate(40px, 50px); }
            70%       { transform: translate(-20px, 30px); }
        }

        @keyframes drift-2 {
            0%, 100% { transform: translate(0, 0); }
            35%       { transform: translate(-35px, 40px); }
            70%       { transform: translate(15px, 20px); }
        }

        @keyframes drift-3 {
            0%, 100% { transform: translateX(-50%) translate(0, 0); }
            50%       { transform: translateX(-50%) translate(30px, -30px); }
        }

        @keyframes drift-4 {
            0%, 100% { transform: translate(0, 0); }
            50%       { transform: translate(-25px, -35px); }
        }

        @keyframes breathe-orb {
            0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
            50%       { opacity: 1;   transform: translate(-50%, -50%) scale(1.18); }
        }

        /* ─── Water ripple rings ─── */

        .ripples {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .ring {
            position: absolute;
            top: 50%;
            left: 50%;
            border-radius: 50%;
            border: 1px solid transparent;
            background:
                linear-gradient(#fdfcff, #fdfcff) padding-box,
                linear-gradient(
                    145deg,
                    rgba(104, 99, 248, 0.28),
                    rgba(9, 158, 241, 0.18) 35%,
                    rgba(240, 88, 197, 0.18) 65%,
                    rgba(255, 137, 31, 0.10)
                ) border-box;
            transform: translate(-50%, -50%) scale(0.2);
            opacity: 0;
            animation: water-ripple 20s cubic-bezier(0.15, 0.5, 0.4, 1) infinite;
        }

        .ring.r1 { width: 300px;  height: 190px;  animation-delay: 0s;  }
        .ring.r2 { width: 500px;  height: 320px;  animation-delay: 4s;  }
        .ring.r3 { width: 700px;  height: 450px;  animation-delay: 8s;  }
        .ring.r4 { width: 900px;  height: 580px;  animation-delay: 12s; }
        .ring.r5 { width: 1100px; height: 710px;  animation-delay: 16s; }

        @keyframes water-ripple {
            0% {
                transform: translate(-50%, -50%) scale(0.2);
                opacity: 0;
            }
            6%  { opacity: 1; }
            60% {
                background:
                    linear-gradient(#fdfcff, #fdfcff) padding-box,
                    linear-gradient(
                        145deg,
                        rgba(104, 99, 248, 0.06),
                        rgba(9, 158, 241, 0.04) 35%,
                        rgba(240, 88, 197, 0.04) 65%,
                        rgba(255, 137, 31, 0.02)
                    ) border-box;
            }
            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0;
            }
        }

        /* ─── Content ─── */

        .content {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 500px;
            padding: 0 32px;
            text-align: center;
        }

        .user-sentence {
            font-size: 0.98rem;
            font-weight: 300;
            color: rgba(90, 75, 130, 0.52);
            font-style: italic;
            line-height: 1.85;
            letter-spacing: 0.01em;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .divider {
            width: 36px;
            height: 1px;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(104, 99, 248, 0.30),
                rgba(240, 88, 197, 0.25),
                transparent
            );
            margin: 2.4rem auto;
        }

        .response {
            font-size: 1.12rem;
            font-weight: 300;
            color: rgba(28, 20, 52, 0.78);
            line-height: 2.3;
            letter-spacing: 0.025em;
            opacity: 0;
            transform: translateY(14px);
            transition: opacity 1.4s ease, transform 1.4s ease;
        }

        .response.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .return-link {
            display: inline-block;
            margin-top: 3.8rem;
            font-size: 0.7rem;
            font-weight: 300;
            color: rgba(120, 100, 170, 0.28);
            letter-spacing: 0.16em;
            text-decoration: none;
            transition: color 0.35s ease;
        }

        .return-link:hover {
            color: rgba(104, 99, 248, 0.55);
        }

        /* ─── Mobile ─── */

        @media (max-width: 420px) {
            .ring.r4, .ring.r5 { display: none; }
            .content { padding: 0 24px; }
            .response { font-size: 1.04rem; }
        }
    </style>
</head>
<body>

    <div class="orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="orb orb-4"></div>
        <div class="orb orb-5"></div>
    </div>

    <div class="ripples">
        <div class="ring r1"></div>
        <div class="ring r2"></div>
        <div class="ring r3"></div>
        <div class="ring r4"></div>
        <div class="ring r5"></div>
    </div>

    <div class="content">
        <p class="user-sentence" id="user-text"></p>
        <div class="divider" id="divider"></div>
        <p class="response" id="response">
            你不是没有放下<br>
            你是在慢慢放<br>
            只是你希望它更快一点
        </p>
        <a href="experience-entry.html" class="return-link">← 再说一句</a>
    </div>

    <script>
        requestAnimationFrame(() => {
            requestAnimationFrame(() => {
                document.body.classList.add('visible');
            });
        });

        const stored = localStorage.getItem('spiritshell_input');
        const userTextEl = document.getElementById('user-text');
        const dividerEl  = document.getElementById('divider');

        if (stored && stored.trim()) {
            userTextEl.textContent = stored.trim();
        } else {
            userTextEl.style.display = 'none';
            dividerEl.style.display  = 'none';
        }

        setTimeout(() => {
            document.getElementById('response').classList.add('visible');
        }, 1600);
    </script>

</body>
</html>
