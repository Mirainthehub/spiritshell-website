<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>灵壳 · SpiritShell</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html { height: 100%; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #fdfcff;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: opacity 0.9s ease;
        }

        body.exiting {
            opacity: 0;
            pointer-events: none;
        }

        /* ─── Luma gradient orbs ─── */

        .orbs {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
        }

        /* Cyan — top left */
        .orb-1 {
            width: 720px;
            height: 720px;
            top: -30%;
            left: -20%;
            background: radial-gradient(circle, rgba(9, 158, 241, 0.22) 0%, transparent 60%);
            animation: drift-1 26s ease-in-out infinite;
        }

        /* Purple — top right */
        .orb-2 {
            width: 600px;
            height: 600px;
            top: -20%;
            right: -18%;
            background: radial-gradient(circle, rgba(104, 99, 248, 0.20) 0%, transparent 60%);
            animation: drift-2 22s ease-in-out infinite;
        }

        /* Pink/Magenta — bottom center */
        .orb-3 {
            width: 640px;
            height: 640px;
            bottom: -25%;
            left: 50%;
            transform: translateX(-50%);
            background: radial-gradient(circle, rgba(240, 88, 197, 0.18) 0%, transparent 60%);
            animation: drift-3 30s ease-in-out infinite;
        }

        /* Warm orange — bottom right accent */
        .orb-4 {
            width: 400px;
            height: 400px;
            bottom: -10%;
            right: -8%;
            background: radial-gradient(circle, rgba(255, 137, 31, 0.14) 0%, transparent 60%);
            animation: drift-4 18s ease-in-out infinite;
        }

        /* Central breathing glow */
        .orb-5 {
            width: 500px;
            height: 500px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, rgba(216, 79, 250, 0.07) 0%, transparent 60%);
            animation: breathe-orb 11s ease-in-out infinite;
        }

        @keyframes drift-1 {
            0%, 100% { transform: translate(0, 0); }
            40%       { transform: translate(40px, 50px); }
            70%       { transform: translate(-20px, 30px); }
        }

        @keyframes drift-2 {
            0%, 100% { transform: translate(0, 0); }
            35%       { transform: translate(-35px, 40px); }
            70%       { transform: translate(15px, 20px); }
        }

        @keyframes drift-3 {
            0%, 100% { transform: translateX(-50%) translate(0, 0); }
            50%       { transform: translateX(-50%) translate(30px, -30px); }
        }

        @keyframes drift-4 {
            0%, 100% { transform: translate(0, 0); }
            50%       { transform: translate(-25px, -35px); }
        }

        @keyframes breathe-orb {
            0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
            50%       { opacity: 1;   transform: translate(-50%, -50%) scale(1.18); }
        }

        /* ─── Water ripple rings ─── */

        .ripples {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .ring {
            position: absolute;
            top: 50%;
            left: 50%;
            border-radius: 50%;
            border: 1px solid transparent;
            background:
                linear-gradient(#fdfcff, #fdfcff) padding-box,
                linear-gradient(
                    145deg,
                    rgba(104, 99, 248, 0.28),
                    rgba(9, 158, 241, 0.18) 35%,
                    rgba(240, 88, 197, 0.18) 65%,
                    rgba(255, 137, 31, 0.10)
                ) border-box;
            transform: translate(-50%, -50%) scale(0.2);
            opacity: 0;
            animation: water-ripple 20s cubic-bezier(0.15, 0.5, 0.4, 1) infinite;
        }

        .ring.r1 { width: 300px;  height: 190px;  animation-delay: 0s;  }
        .ring.r2 { width: 500px;  height: 320px;  animation-delay: 4s;  }
        .ring.r3 { width: 700px;  height: 450px;  animation-delay: 8s;  }
        .ring.r4 { width: 900px;  height: 580px;  animation-delay: 12s; }
        .ring.r5 { width: 1100px; height: 710px;  animation-delay: 16s; }

        @keyframes water-ripple {
            0% {
                transform: translate(-50%, -50%) scale(0.2);
                opacity: 0;
            }
            6%  { opacity: 1; }
            60% {
                background:
                    linear-gradient(#fdfcff, #fdfcff) padding-box,
                    linear-gradient(
                        145deg,
                        rgba(104, 99, 248, 0.06),
                        rgba(9, 158, 241, 0.04) 35%,
                        rgba(240, 88, 197, 0.04) 65%,
                        rgba(255, 137, 31, 0.02)
                    ) border-box;
            }
            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0;
            }
        }

        /* ─── Content ─── */

        .content {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 560px;
            padding: 0 28px;
            text-align: center;
        }

        .hero-title {
            font-size: clamp(1.3rem, 4vw, 1.8rem);
            font-weight: 300;
            color: rgba(30, 22, 55, 0.78);
            letter-spacing: 0.015em;
            margin-bottom: 0.55rem;
        }

        .hero-sub {
            font-size: 0.9rem;
            font-weight: 300;
            color: rgba(90, 75, 130, 0.48);
            line-height: 2.2;
            margin-bottom: 2.8rem;
            letter-spacing: 0.025em;
        }

        /* ─── Input ─── */

        .input-wrap {
            position: relative;
        }

        textarea {
            display: block;
            width: 100%;
            background: rgba(255, 255, 255, 0.72);
            border: 1px solid rgba(140, 120, 200, 0.18);
            border-radius: 16px;
            padding: 20px 22px;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 300;
            color: rgba(28, 20, 52, 0.85);
            line-height: 1.78;
            resize: none;
            min-height: 112px;
            outline: none;
            transition: border-color 0.5s ease, box-shadow 0.5s ease, background 0.5s ease;
            caret-color: rgba(104, 99, 248, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 2px 20px rgba(104, 99, 248, 0.06);
        }

        textarea::placeholder {
            color: rgba(120, 105, 165, 0.38);
            font-weight: 300;
            font-style: italic;
        }

        textarea:focus {
            background: rgba(255, 255, 255, 0.88);
            border-color: rgba(104, 99, 248, 0.30);
            box-shadow:
                0 0 0 3px rgba(104, 99, 248, 0.08),
                0 4px 30px rgba(104, 99, 248, 0.12),
                0 2px 20px rgba(240, 88, 197, 0.06);
        }

        .presence {
            font-size: 0.73rem;
            font-weight: 300;
            color: rgba(120, 100, 170, 0.32);
            letter-spacing: 0.16em;
            margin-top: 0.7rem;
            text-align: right;
            padding-right: 4px;
            user-select: none;
        }

        .enter-hint {
            margin-top: 2.2rem;
            font-size: 0.68rem;
            font-weight: 300;
            color: rgba(110, 95, 150, 0.28);
            letter-spacing: 0.1em;
            user-select: none;
        }

        /* ─── Mobile ─── */

        @media (max-width: 420px) {
            .ring.r4, .ring.r5 { display: none; }
            .content { padding: 0 22px; }
            textarea { padding: 16px 18px; }
        }
    </style>
</head>
<body>

    <div class="orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="orb orb-4"></div>
        <div class="orb orb-5"></div>
    </div>

    <div class="ripples">
        <div class="ring r1"></div>
        <div class="ring r2"></div>
        <div class="ring r3"></div>
        <div class="ring r4"></div>
        <div class="ring r5"></div>
    </div>

    <div class="content">
        <h1 class="hero-title">You can start anywhere.</h1>
        <p class="hero-sub">
            此刻有什么<br>
            说出来就是了
        </p>

        <div class="input-wrap">
            <textarea id="thought" rows="3" autofocus></textarea>
            <p class="presence">我在</p>
        </div>

        <p class="enter-hint">按 Enter 继续 &nbsp;·&nbsp; Shift+Enter 换行</p>
    </div>

    <script>
        const textarea = document.getElementById('thought');

        const placeholders = [
            '...',
            '随便说一句就好',
            '现在的你，会说什么？'
        ];
        let phIndex = 0;
        let phTimer = null;

        function cyclePlaceholder() {
            textarea.placeholder = '';
            setTimeout(() => {
                phIndex = (phIndex + 1) % placeholders.length;
                textarea.placeholder = placeholders[phIndex];
                phTimer = setTimeout(cyclePlaceholder, 3800);
            }, 280);
        }

        textarea.placeholder = placeholders[0];
        phTimer = setTimeout(cyclePlaceholder, 3800);

        textarea.addEventListener('input', () => {
            if (phTimer) { clearTimeout(phTimer); phTimer = null; }
            textarea.placeholder = '';
        }, { once: true });

        textarea.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                const text = textarea.value.trim();
                if (!text) return;
                submit(text);
            }
        });

        function submit(text) {
            localStorage.setItem('spiritshell_input', text);
            document.body.classList.add('exiting');
            setTimeout(() => {
                window.location.href = 'experience.html';
            }, 920);
        }
    </script>

</body>
</html>
