<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>灵壳 · SpiritShell</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html { height: 100%; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #070a0f;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: opacity 0.85s ease;
        }

        body.exiting {
            opacity: 0;
            pointer-events: none;
        }

        /* ─── Ambient atmosphere ─── */

        .ambient {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        .ambient-core {
            position: absolute;
            inset: 0;
            background: radial-gradient(
                ellipse at 50% 44%,
                rgba(55, 85, 135, 0.11) 0%,
                transparent 62%
            );
            animation: breathe 10s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { opacity: 0.45; transform: scale(1); }
            50%       { opacity: 1;    transform: scale(1.07); }
        }

        .ripple {
            position: absolute;
            top: 50%;
            left: 50%;
            border-radius: 50%;
            border: 1px solid rgba(100, 130, 180, 0.048);
            transform: translate(-50%, -50%) scale(0.85);
            animation: ripple-expand 20s ease-out infinite;
        }

        .ripple.r1 { width: 380px; height: 250px; animation-delay: 0s;  }
        .ripple.r2 { width: 620px; height: 410px; animation-delay: 6s;  }
        .ripple.r3 { width: 860px; height: 570px; animation-delay: 12s; }

        @keyframes ripple-expand {
            0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.85); }
            12%  { opacity: 1; }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1.22); }
        }

        /* ─── Content ─── */

        .content {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 560px;
            padding: 0 28px;
            text-align: center;
        }

        .hero-title {
            font-size: clamp(1.3rem, 4vw, 1.8rem);
            font-weight: 300;
            color: rgba(228, 222, 214, 0.76);
            letter-spacing: 0.015em;
            margin-bottom: 0.55rem;
        }

        .hero-sub {
            font-size: 0.9rem;
            font-weight: 300;
            color: rgba(190, 184, 176, 0.36);
            line-height: 2.2;
            margin-bottom: 2.8rem;
            letter-spacing: 0.025em;
        }

        /* ─── Input ─── */

        .input-wrap {
            position: relative;
        }

        textarea {
            display: block;
            width: 100%;
            background: rgba(255, 255, 255, 0.022);
            border: 1px solid rgba(255, 255, 255, 0.062);
            border-radius: 14px;
            padding: 20px 22px;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 300;
            color: rgba(230, 224, 216, 0.88);
            line-height: 1.78;
            resize: none;
            min-height: 112px;
            outline: none;
            transition: border-color 0.5s ease, box-shadow 0.5s ease;
            caret-color: rgba(150, 185, 230, 0.65);
        }

        textarea::placeholder {
            color: rgba(172, 166, 158, 0.28);
            font-weight: 300;
            font-style: italic;
        }

        textarea:focus {
            border-color: rgba(95, 138, 200, 0.14);
            box-shadow:
                0 0 55px rgba(65, 105, 170, 0.07),
                inset 0 0 28px rgba(65, 105, 170, 0.022);
        }

        .presence {
            font-size: 0.75rem;
            font-weight: 300;
            color: rgba(165, 160, 152, 0.2);
            letter-spacing: 0.14em;
            margin-top: 0.7rem;
            text-align: right;
            padding-right: 4px;
            user-select: none;
        }

        .enter-hint {
            margin-top: 2.2rem;
            font-size: 0.7rem;
            font-weight: 300;
            color: rgba(155, 150, 142, 0.18);
            letter-spacing: 0.1em;
            user-select: none;
        }

        /* ─── Mobile ─── */

        @media (max-width: 420px) {
            .ripple.r2, .ripple.r3 { display: none; }
            .content { padding: 0 22px; }
            textarea { padding: 16px 18px; }
        }
    </style>
</head>
<body>

    <div class="ambient">
        <div class="ambient-core"></div>
        <div class="ripple r1"></div>
        <div class="ripple r2"></div>
        <div class="ripple r3"></div>
    </div>

    <div class="content">
        <h1 class="hero-title">You can start anywhere.</h1>
        <p class="hero-sub">
            不需要是问题<br>
            也不需要完整
        </p>

        <div class="input-wrap">
            <textarea id="thought" rows="3" autofocus></textarea>
            <p class="presence">我在</p>
        </div>

        <p class="enter-hint">按 Enter 继续 &nbsp;·&nbsp; Shift+Enter 换行</p>
    </div>

    <script>
        const textarea = document.getElementById('thought');

        // ── Cycling placeholder ──
        const placeholders = [
            '...',
            '随便说一句就好',
            '现在的你，会说什么？'
        ];
        let phIndex = 0;
        let phTimer = null;

        function showPlaceholder(text) {
            textarea.placeholder = text;
        }

        function cyclePlaceholder() {
            // Brief blank pause creates a soft "fade" illusion between states
            showPlaceholder('');
            setTimeout(() => {
                phIndex = (phIndex + 1) % placeholders.length;
                showPlaceholder(placeholders[phIndex]);
                phTimer = setTimeout(cyclePlaceholder, 3800);
            }, 280);
        }

        showPlaceholder(placeholders[0]);
        phTimer = setTimeout(cyclePlaceholder, 3800);

        // Stop cycling once user starts typing
        textarea.addEventListener('input', () => {
            if (phTimer) {
                clearTimeout(phTimer);
                phTimer = null;
            }
            textarea.placeholder = '';
        }, { once: true });

        // ── Enter to submit ──
        textarea.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                const text = textarea.value.trim();
                if (!text) return;
                submit(text);
            }
        });

        function submit(text) {
            localStorage.setItem('spiritshell_input', text);
            document.body.classList.add('exiting');
            setTimeout(() => {
                window.location.href = 'experience.html';
            }, 860);
        }
    </script>

</body>
</html>
